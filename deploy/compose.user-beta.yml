services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-podcast_hub}
      POSTGRES_USER: ${POSTGRES_USER:-podcast_hub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-replace_with_database_password}
    volumes:
      - user_beta_postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-podcast_hub} -d ${POSTGRES_DB:-podcast_hub}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - user_beta_private

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - user_beta_redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - user_beta_private

  api-volume-init:
    image: alpine:3.20
    user: "0:0"
    command: ["sh", "-c", "mkdir -p /data/connector-packages /data/import-artifacts /data/staging /data/private-media /data/tmp && chmod 0770 /data/connector-packages /data/import-artifacts /data/staging /data/private-media /data/tmp && chown 10001:10001 /data/connector-packages /data/import-artifacts /data/staging /data/private-media /data/tmp"]
    volumes:
      - user_beta_connector_packages:/data/connector-packages
      - user_beta_import_artifacts:/data/import-artifacts
      - user_beta_staging:/data/staging
      - user_beta_private_media:/data/private-media
      - user_beta_tmp:/data/tmp
    network_mode: none
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN

  api:
    build:
      context: ..
      dockerfile: Dockerfile.alpha
    user: "10001:10001"
    read_only: true
    environment:
      APP_ENV: ${APP_ENV:-production}
      HTTP_ADDR: ${HTTP_ADDR:-:8080}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-https://podcast-hub.example.invalid}
      DATABASE_URL: ${DATABASE_URL:-postgresql://podcast_hub:replace_with_database_password@postgres:5432/podcast_hub?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-podcast_hub_session}
      SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN:-}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-1209600}
      SESSION_PEPPER: ${SESSION_PEPPER:-replace_with_random_session_pepper}
      AUTH_CODE_PEPPER: ${AUTH_CODE_PEPPER:-replace_with_random_auth_code_pepper}
      CSRF_HEADER_NAME: ${CSRF_HEADER_NAME:-X-CSRF-Token}
      TURNSTILE_MODE: ${TURNSTILE_MODE:-cloudflare}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-replace_with_cloudflare_turnstile_secret}
      SMTP_HOST: ${SMTP_HOST:-smtp.example.invalid}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-replace_with_smtp_username}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-replace_with_smtp_password}
      SMTP_FROM: ${SMTP_FROM:-no-reply@example.invalid}
      SECRETS_MASTER_KEY: ${SECRETS_MASTER_KEY:-replace_with_32_byte_or_base64_key}
      CONNECTOR_PACKAGE_LOCAL_DIR: /data/connector-packages
      IMPORT_ARTIFACT_STORE_DIR: /data/import-artifacts
      STAGING_STORE_DIR: /data/staging
      MEDIA_STORE_DIR: /data/private-media
      RUNNER_MODE: ${RUNNER_MODE:-disabled}
    depends_on:
      api-volume-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8080"
    volumes:
      - user_beta_connector_packages:/data/connector-packages
      - user_beta_import_artifacts:/data/import-artifacts
      - user_beta_staging:/data/staging
      - user_beta_private_media:/data/private-media
      - user_beta_tmp:/tmp
    tmpfs:
      - /run
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - user_beta_private

  frontend:
    image: nginx:1.27-alpine
    read_only: true
    volumes:
      - ../dist:/usr/share/nginx/html:ro
      - user_beta_nginx_cache:/var/cache/nginx
      - user_beta_nginx_run:/var/run
    expose:
      - "80"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - user_beta_private

  caddy:
    image: caddy:2-alpine
    depends_on:
      - api
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.user-beta.template:/etc/caddy/Caddyfile:ro
      - user_beta_caddy_data:/data
      - user_beta_caddy_config:/config
    networks:
      - user_beta_private

volumes:
  user_beta_postgres_data:
    name: podcast_hub_user_beta_postgres_data
  user_beta_redis_data:
    name: podcast_hub_user_beta_redis_data
  user_beta_connector_packages:
    name: podcast_hub_user_beta_connector_packages
  user_beta_import_artifacts:
    name: podcast_hub_user_beta_import_artifacts
  user_beta_staging:
    name: podcast_hub_user_beta_staging
  user_beta_private_media:
    name: podcast_hub_user_beta_private_media
  user_beta_tmp:
    name: podcast_hub_user_beta_tmp
  user_beta_nginx_cache:
    name: podcast_hub_user_beta_nginx_cache
  user_beta_nginx_run:
    name: podcast_hub_user_beta_nginx_run
  user_beta_caddy_data:
    name: podcast_hub_user_beta_caddy_data
  user_beta_caddy_config:
    name: podcast_hub_user_beta_caddy_config

networks:
  user_beta_private:
    name: podcast_hub_user_beta_private
