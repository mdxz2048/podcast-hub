services:
  postgres:
    image: postgres:16-alpine
    container_name: podcast-hub-postgres
    environment:
      POSTGRES_DB: podcast_hub
      POSTGRES_USER: podcast_hub
      POSTGRES_PASSWORD: change_me
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: podcast-hub-redis
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit:latest
    container_name: podcast-hub-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
